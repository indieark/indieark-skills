interface:
  display_name: "Video Gen Pro"
  short_description: "默认处理视频生成需求，也可介绍功能和使用路线；当前 provider adapter 是 Seedance 2.0 / 火山方舟"
  default_prompt: "Use $video-gen-pro when I want to generate a video from text, images, or reference media, or when I need a detailed feature introduction, usage guide, or on-demand explanation of a specific workflow feature such as input modes, reusable character cards, reusable scene cards, storyboards, sound, confirmation/review flow, CLI/API setup, or trigger boundaries. For guide-only requests, explain capabilities, boundaries, input modes, workflow, required materials, confirmation gates, and next steps without calling the CLI. For complex generation, first convert natural language into script candidates; derive the character/scene/prop asset dependencies from the script (assets come from the script, not reverse-engineered from shots), then do the shot breakdown and let each shot reference assets from that list; before creating scene cards, route each scene by shot angle count, reuse strength, and spatial risk instead of defaulting to a simple single scene image; search existing projects/assets and confirm cross-project asset reuse before creating new character or scene cards. Use the standard text plus structured JSON confirmation and recap flow."

policy:
  allow_implicit_invocation: true
